<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nome do Seu Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <!-- Logo/nome da marca e links (ex: Início, Sobre, Contato) -->
        </nav>
    </header>

    <main>
        <section id="produto">
            <!-- Imagem do produto, título, descrição curta, preço -->
            <!-- Ex: <h1>Nome do Produto</h1> <p>Descrição...</p> <span>R$ 99,90</span> -->
        </section>

        <section id="sobre">
            <!-- Descrição mais detalhada do produto/benefícios -->
        </section>

        <section id="comprar">
            <h2>Faça seu pedido</h2>
            <form>
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Comprar agora</button>
            </form>
        </section>
    </main>

    <footer>
        <!-- Direitos autorais, links de redes sociais, etc -->
    </footer>

</body>
</html>
